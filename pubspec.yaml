name: vocabodemo
description: "VOCABO APP"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_database: ^12.3.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.3.0
  provider: ^6.1.2
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.10
  table_calendar: ^3.1.2
  http: ^1.2.0
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0
  font_awesome_flutter: ^10.7.0
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1
  cloud_functions: ^6.2.0
  flutter_dotenv: ^5.1.0
  confetti: ^0.7.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_animate: ^4.5.0
flutter_native_splash:
  color: "#ffffff"
  image: assets/images/ic_launcher.png
  android: true
  ios: true
dev_dependencies:
  flutter_test:
    sdk: flutter


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/furniture/
    - assets/characters/
    - .env