<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 85" style="shape-rendering:geometricPrecision">
  <!-- Back rest -->
  <rect x="12" y="2" width="126" height="36" rx="12" fill="#E8C87A" stroke="#8B6914" stroke-width="2.5"/>
  <!-- Back cushion highlight -->
  <rect x="16" y="5" width="118" height="28" rx="10" fill="#F0D48A" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Back cushion divider -->
  <line x1="75" y1="5" x2="75" y2="33" stroke="#8B6914" stroke-width="2" opacity="0.5"/>
  <!-- Seat base -->
  <rect x="12" y="34" width="126" height="36" rx="8" fill="#F0D48A" stroke="#8B6914" stroke-width="2.5"/>
  <!-- Seat cushions -->
  <rect x="16" y="37" width="58" height="30" rx="6" fill="#F5DC9A" stroke="#8B6914" stroke-width="1.5"/>
  <rect x="76" y="37" width="58" height="30" rx="6" fill="#F5DC9A" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Cushion stitch lines -->
  <path d="M20 52 Q45 48 70 52" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
  <path d="M80 52 Q105 48 130 52" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
  <!-- Left armrest -->
  <rect x="0" y="20" width="16" height="50" rx="8" fill="#D4A840" stroke="#8B6914" stroke-width="2.5"/>
  <rect x="2" y="22" width="12" height="44" rx="6" fill="#E0B850" opacity="0.7"/>
  <!-- Right armrest -->
  <rect x="134" y="20" width="16" height="50" rx="8" fill="#D4A840" stroke="#8B6914" stroke-width="2.5"/>
  <rect x="136" y="22" width="12" height="44" rx="6" fill="#E0B850" opacity="0.7"/>
  <!-- Legs -->
  <rect x="16" y="68" width="10" height="16" rx="4" fill="#5D3A1A" stroke="#3D2010" stroke-width="1.5"/>
  <rect x="124" y="68" width="10" height="16" rx="4" fill="#5D3A1A" stroke="#3D2010" stroke-width="1.5"/>
  <rect x="68" y="68" width="10" height="14" rx="4" fill="#5D3A1A" stroke="#3D2010" stroke-width="1.5"/>
  <!-- Throw pillow (round, Adorable Home style) -->
  <ellipse cx="75" cy="30" rx="16" ry="12" fill="#F4A261" stroke="#C07030" stroke-width="2"/>
  <ellipse cx="75" cy="30" rx="10" ry="7" fill="#F8B87A" opacity="0.6"/>
</svg>