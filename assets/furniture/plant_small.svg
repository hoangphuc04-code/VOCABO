<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55 75" style="shape-rendering:geometricPrecision">
  <!-- Pot -->
  <path d="M14 55 L10 72 L45 72 L41 55 Z" fill="#C8A870" stroke="#8B6914" stroke-width="2"/>
  <!-- Pot rim -->
  <rect x="10" y="50" width="35" height="8" rx="4" fill="#D4B880" stroke="#8B6914" stroke-width="2"/>
  <!-- Soil -->
  <ellipse cx="27" cy="50" rx="15" ry="4" fill="#5D3A1A" stroke="#3D2010" stroke-width="1"/>
  <!-- Stem -->
  <line x1="27" y1="48" x2="27" y2="20" stroke="#558B2F" stroke-width="2.5"/>
  <!-- Left branch -->
  <path d="M27 38 Q16 30 12 18" fill="none" stroke="#558B2F" stroke-width="2"/>
  <!-- Right branch -->
  <path d="M27 32 Q38 24 42 14" fill="none" stroke="#558B2F" stroke-width="2"/>
  <!-- Leaves -->
  <ellipse cx="10" cy="15" rx="11" ry="7" fill="#66BB6A" stroke="#388E3C" stroke-width="2" transform="rotate(-20 10 15)"/>
  <ellipse cx="43" cy="11" rx="11" ry="7" fill="#4CAF50" stroke="#388E3C" stroke-width="2" transform="rotate(20 43 11)"/>
  <ellipse cx="27" cy="17" rx="9" ry="6" fill="#81C784" stroke="#388E3C" stroke-width="2" transform="rotate(5 27 17)"/>
  <!-- Leaf veins -->
  <line x1="10" y1="15" x2="4" y2="12" stroke="#388E3C" stroke-width="0.8" opacity="0.6"/>
  <line x1="43" y1="11" x2="49" y2="8" stroke="#388E3C" stroke-width="0.8" opacity="0.6"/>
</svg>