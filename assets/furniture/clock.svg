<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 90" style="shape-rendering:geometricPrecision">
  <!-- Clock case -->
  <rect x="10" y="5" width="50" height="65" rx="8" fill="#C8A870" stroke="#8B6914" stroke-width="2.5"/>
  <!-- Clock face -->
  <circle cx="35" cy="32" r="20" fill="#F5F0E8" stroke="#8B6914" stroke-width="2"/>
  <circle cx="35" cy="32" r="18" fill="white" stroke="#C8B89A" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="35" y1="15" x2="35" y2="19" stroke="#333" stroke-width="2"/>
  <line x1="35" y1="45" x2="35" y2="49" stroke="#333" stroke-width="2"/>
  <line x1="18" y1="32" x2="22" y2="32" stroke="#333" stroke-width="2"/>
  <line x1="48" y1="32" x2="52" y2="32" stroke="#333" stroke-width="2"/>
  <!-- Diagonal markers -->
  <line x1="22" y1="19" x2="24" y2="22" stroke="#333" stroke-width="1.5"/>
  <line x1="48" y1="19" x2="46" y2="22" stroke="#333" stroke-width="1.5"/>
  <line x1="22" y1="45" x2="24" y2="42" stroke="#333" stroke-width="1.5"/>
  <line x1="48" y1="45" x2="46" y2="42" stroke="#333" stroke-width="1.5"/>
  <!-- Clock hands -->
  <line x1="35" y1="32" x2="35" y2="20" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="32" x2="44" y2="32" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="35" cy="32" r="2.5" fill="#333"/>
  <!-- Pendulum window -->
  <rect x="22" y="54" width="26" height="12" rx="4" fill="#E8D8B0" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Pendulum -->
  <line x1="35" y1="54" x2="35" y2="62" stroke="#C8A870" stroke-width="1.5"/>
  <ellipse cx="35" cy="63" rx="5" ry="3" fill="#D4A840" stroke="#8B6914" stroke-width="1"/>
  <!-- Base feet -->
  <rect x="14" y="68" width="12" height="6" rx="3" fill="#8B6914"/>
  <rect x="44" y="68" width="12" height="6" rx="3" fill="#8B6914"/>
</svg>