<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" style="shape-rendering:geometricPrecision">
  <!-- Bed frame - wooden green like Adorable Home -->
  <rect x="2" y="12" width="136" height="82" rx="5" fill="#7A9E7E" stroke="#3D5C40" stroke-width="2.5"/>
  <!-- Headboard -->
  <rect x="2" y="2" width="136" height="22" rx="5" fill="#5A7A5E" stroke="#3D5C40" stroke-width="2.5"/>
  <!-- Headboard panel detail -->
  <rect x="10" y="6" width="120" height="12" rx="3" fill="#6B8E6F" stroke="#3D5C40" stroke-width="1.5"/>
  <!-- Mattress -->
  <rect x="8" y="24" width="124" height="64" rx="4" fill="#F5F0E8" stroke="#C8B89A" stroke-width="1.5"/>
  <!-- Checkered pattern (Adorable Home style) -->
  <rect x="8" y="24" width="62" height="32" fill="#EDE5D5" stroke="none"/>
  <rect x="70" y="56" width="62" height="32" fill="#EDE5D5" stroke="none"/>
  <!-- Grid lines on mattress -->
  <line x1="8" y1="40" x2="132" y2="40" stroke="#C8B89A" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="56" x2="132" y2="56" stroke="#C8B89A" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="24" x2="70" y2="88" stroke="#C8B89A" stroke-width="1" opacity="0.5"/>
  <!-- Left pillow -->
  <rect x="12" y="28" width="50" height="26" rx="10" fill="white" stroke="#C8B89A" stroke-width="2"/>
  <path d="M18 41 Q37 36 54 41" fill="none" stroke="#C8B89A" stroke-width="1" opacity="0.6"/>
  <!-- Right pillow -->
  <rect x="78" y="28" width="50" height="26" rx="10" fill="white" stroke="#C8B89A" stroke-width="2"/>
  <path d="M84 41 Q103 36 120 41" fill="none" stroke="#C8B89A" stroke-width="1" opacity="0.6"/>
  <!-- Blanket -->
  <rect x="8" y="58" width="124" height="30" rx="4" fill="#C8D8C8" stroke="#8FAF8F" stroke-width="2"/>
  <!-- Blanket fold line -->
  <path d="M8 66 Q70 62 132 66" fill="none" stroke="#8FAF8F" stroke-width="1.5"/>
  <!-- Footboard -->
  <rect x="2" y="88" width="136" height="10" rx="4" fill="#5A7A5E" stroke="#3D5C40" stroke-width="2"/>
  <!-- Legs -->
  <rect x="8" y="94" width="10" height="6" rx="2" fill="#3D5C40"/>
  <rect x="122" y="94" width="10" height="6" rx="2" fill="#3D5C40"/>
</svg>