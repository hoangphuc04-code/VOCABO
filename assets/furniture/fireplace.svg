  <!-- Stone bricks pattern -->
  <rect x="4" y="4" width="48" height="18" rx="2" fill="#C0B0A0" stroke="#7A6A5A" stroke-width="1.5"/>
  <rect x="56" y="4" width="50" height="18" rx="2" fill="#B8A898" stroke="#7A6A5A" stroke-width="1.5"/>
  <rect x="4" y="24" width="32" height="18" rx="2" fill="#B8A898" stroke="#7A6A5A" stroke-width="1.5"/>
  <rect x="38" y="24" width="36" height="18" rx="2" fill="#C0B0A0" stroke="#7A6A5A" stroke-width="1.5"/>
  <rect x="76" y="24" width="30" height="18" rx="2" fill="#B0A090" stroke="#7A6A5A" stroke-width="1.5"/>
  <rect x="4" y="44" width="44" height="18" rx="2" fill="#C0B0A0" stroke="#7A6A5A" stroke-width="1.5"/>
  <rect x="50" y="44" width="56" height="18" rx="2" fill="#B8A898" stroke="#7A6A5A" stroke-width="1.5"/>
  <!-- Fireplace opening -->
