<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90">
  <!-- Desk surface -->
  <rect x="0" y="18" width="120" height="14" rx="4" fill="#C8B89A" stroke="#A89070" stroke-width="1.5"/>
  <!-- Surface top highlight -->
  <rect x="2" y="19" width="116" height="5" rx="3" fill="#D4C4A8" opacity="0.7"/>
