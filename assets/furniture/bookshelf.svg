<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110">
  <!-- Shelf frame -->
  <rect x="0" y="0" width="80" height="110" rx="4" fill="#8D6E63" stroke="#6D4C41" stroke-width="2"/>
  <!-- Back panel -->
  <rect x="4" y="4" width="72" height="102" rx="2" fill="#A1887F"/>
  <!-- Shelf 1 (top) -->
  <rect x="2" y="30" width="76" height="6" rx="2" fill="#6D4C41"/>
  <!-- Shelf 2 (middle) -->
  <rect x="2" y="62" width="76" height="6" rx="2" fill="#6D4C41"/>
  <!-- Shelf 3 (bottom) -->
  <rect x="2" y="94" width="76" height="6" rx="2" fill="#6D4C41"/>

  <!-- Top shelf books -->
  <rect x="6" y="8" width="8" height="22" rx="1" fill="#E53935"/>
  <rect x="15" y="10" width="7" height="20" rx="1" fill="#1E88E5"/>
  <rect x="23" y="7" width="9" height="23" rx="1" fill="#43A047"/>
  <rect x="33" y="11" width="6" height="19" rx="1" fill="#FFB300"/>
  <rect x="40" y="8" width="8" height="22" rx="1" fill="#8E24AA"/>
  <rect x="49" y="9" width="7" height="21" rx="1" fill="#00ACC1"/>
  <rect x="57" y="7" width="9" height="23" rx="1" fill="#F4511E"/>
  <rect x="67" y="10" width="7" height="20" rx="1" fill="#6D4C41"/>
  <!-- Book spines detail -->
  <line x1="10" y1="12" x2="10" y2="26" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="18" y1="14" x2="18" y2="26" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <!-- Middle shelf items -->
  <rect x="6" y="38" width="7" height="24" rx="1" fill="#1565C0"/>
  <rect x="14" y="40" width="8" height="22" rx="1" fill="#C62828"/>
  <rect x="23" y="36" width="6" height="26" rx="1" fill="#2E7D32"/>
  <!-- Small plant pot -->
  <rect x="32" y="48" width="14" height="14" rx="3" fill="#8D6E63"/>
  <ellipse cx="39" cy="46" rx="10" ry="12" fill="#66BB6A"/>
  <ellipse cx="34" cy="44" rx="6" ry="8" fill="#81C784"/>
  <!-- More books -->
  <rect x="50" y="38" width="7" height="24" rx="1" fill="#F57F17"/>
  <rect x="58" y="40" width="8" height="22" rx="1" fill="#4527A0"/>
  <rect x="67" y="37" width="7" height="25" rx="1" fill="#00695C"/>

  <!-- Bottom shelf items -->
  <rect x="6" y="70" width="9" height="24" rx="1" fill="#AD1457"/>
  <rect x="16" y="72" width="7" height="22" rx="1" fill="#0277BD"/>
  <!-- Small box -->
  <rect x="26" y="74" width="18" height="18" rx="2" fill="#FFD54F" stroke="#FFB300" stroke-width="1"/>
  <line x1="26" y1="83" x2="44" y2="83" stroke="#FFB300" stroke-width="1"/>
  <line x1="35" y1="74" x2="35" y2="92" stroke="#FFB300" stroke-width="1"/>
  <!-- Books -->
  <rect x="47" y="70" width="8" height="24" rx="1" fill="#558B2F"/>
  <rect x="56" y="72" width="7" height="22" rx="1" fill="#E64A19"/>
  <rect x="64" y="69" width="10" height="25" rx="1" fill="#37474F"/>
</svg>