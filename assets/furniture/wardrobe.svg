<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <!-- Wardrobe body -->
  <rect x="0" y="0" width="100" height="115" rx="4" fill="#8D6E63" stroke="#6D4C41" stroke-width="2"/>
  <!-- Top panel -->
  <rect x="2" y="2" width="96" height="12" rx="3" fill="#A1887F"/>
  <!-- Center divider -->
  <line x1="50" y1="14" x2="50" y2="110" stroke="#6D4C41" stroke-width="2"/>
  <!-- Left door -->
  <rect x="4" y="16" width="42" height="90" rx="3" fill="#9C7B6E" stroke="#6D4C41" stroke-width="1"/>
  <!-- Left door panel inset -->
  <rect x="8" y="20" width="34" height="38" rx="2" fill="#A1887F" stroke="#8D6E63" stroke-width="1"/>
  <rect x="8" y="62" width="34" height="40" rx="2" fill="#A1887F" stroke="#8D6E63" stroke-width="1"/>
  <!-- Left door handle -->
  <rect x="43" y="56" width="4" height="12" rx="2" fill="#C8A870"/>
  <!-- Right door -->
  <rect x="54" y="16" width="42" height="90" rx="3" fill="#9C7B6E" stroke="#6D4C41" stroke-width="1"/>
  <!-- Right door panel inset -->
  <rect x="58" y="20" width="34" height="38" rx="2" fill="#A1887F" stroke="#8D6E63" stroke-width="1"/>
  <rect x="58" y="62" width="34" height="40" rx="2" fill="#A1887F" stroke="#8D6E63" stroke-width="1"/>
  <!-- Right door handle -->
  <rect x="53" y="56" width="4" height="12" rx="2" fill="#C8A870"/>
  <!-- Clothes visible through top panels (decorative) -->
  <!-- Left: folded clothes -->
  <rect x="12" y="24" width="26" height="6" rx="2" fill="#90CAF9" opacity="0.7"/>
  <rect x="12" y="32" width="26" height="6" rx="2" fill="#F48FB1" opacity="0.7"/>
  <rect x="12" y="40" width="26" height="6" rx="2" fill="#A5D6A7" opacity="0.7"/>
  <!-- Right: hanging clothes -->
  <!-- Hanger rod -->
  <line x1="60" y1="24" x2="90" y2="24" stroke="#8D6E63" stroke-width="2"/>
  <!-- Hangers -->
  <path d="M68 24 L68 30 Q68 36 62 40 L74 40 Q68 36 68 30" fill="none" stroke="#6D4C41" stroke-width="1.5"/>
  <path d="M78 24 L78 30 Q78 36 72 40 L84 40 Q78 36 78 30" fill="none" stroke="#6D4C41" stroke-width="1.5"/>
  <!-- Hanging shirts -->
  <rect x="62" y="38" width="12" height="16" rx="2" fill="#EF9A9A" opacity="0.8"/>
  <rect x="72" y="38" width="12" height="16" rx="2" fill="#80DEEA" opacity="0.8"/>
  <!-- Bottom feet -->
  <rect x="6" y="112" width="12" height="6" rx="2" fill="#5D4037"/>
  <rect x="82" y="112" width="12" height="6" rx="2" fill="#5D4037"/>
</svg>